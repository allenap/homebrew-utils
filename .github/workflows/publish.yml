name: brew pr-pull

on:
  pull_request_target:
    types:
      - labeled
      - closed
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number
        required: true
        type: number

jobs:
  pr-pull:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.action == 'labeled' && contains(github.event.pull_request.labels.*.name, 'pr-pull')) ||
      (github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ github.token }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
          # For workflow_dispatch, use the manually provided PR number; otherwise
          # use the PR number from the pull_request_target event.
          PULL_REQUEST: ${{ github.event_name == 'workflow_dispatch' && inputs.pull_request || github.event.pull_request.number }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          token: ${{ github.token }}
          branch: master

      - name: Delete branch
        if: |
          github.event_name == 'pull_request_target' &&
          github.event.action == 'labeled' &&
          github.event.pull_request.head.repo.fork == false
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: git push --delete origin "$BRANCH"
