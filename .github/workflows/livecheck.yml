name: brew livecheck

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Mondays at 09:00 UTC
  workflow_dispatch:

jobs:
  livecheck:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Bump outdated formulae
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          brew livecheck --tap "$GITHUB_REPOSITORY" --newer-only --quiet --json |
            jq -r '.[] | .formula + "\t" + .version.latest' |
              while IFS=$'\t' read -r formula version; do
                branch="bump-${formula##*/}-${version}"

                if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
                  open_pr_count="$(
                    curl --silent --show-error --fail \
                      --header "Authorization: Bearer $GITHUB_TOKEN" \
                      --header "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/$GITHUB_REPOSITORY/pulls?state=open&head=${GITHUB_REPOSITORY_OWNER}:${branch}" \
                    | jq 'length'
                  )"

                  if [ "$open_pr_count" -gt 0 ]; then
                    echo "Skipping $formula $version: open PR already exists for $branch"
                    continue
                  fi

                  echo "Deleting stale remote branch $branch before bumping $formula to $version"
                  git push --delete origin "$branch"
                fi

                brew bump-formula-pr --no-browse --no-fork --version "$version" "$formula" || true
              done
